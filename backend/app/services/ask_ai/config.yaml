default_model: gemini:gemini_2_5_flash

providers:
  groq:
    api_key: ${GROQ_API_KEY}

  gemini:
    api_key: ${GEMINI_API_KEY}


  nvidia:
    api_key: ${NVIDIA_API_KEY}

models:

  groq:
    llama_70b:
      display_name: Llama 3.3 70B Versatile
      model: groq/llama-3.3-70b-versatile
      context_window: 6000
      max_output_tokens: 6000
      temperature: 0.2
      rate_limit:
        rpm: 30
        rpd: 1000
        tpm: 12000
        tpd: 100000

  gemini:
    gemini_2_5_flash:
      display_name: Gemini 2.5 Flash
      model: gemini/gemini-2.5-flash
      context_window: 1048576
      max_output_tokens: 8192
      temperature: 0.2
      rate_limit:
        rpm: 10
        rpd: 250
        tpm: 250000
        tpd: 1000000

    gemini_flash:
      display_name: Gemini Flash (latest)
      model: gemini/gemini-flash-latest
      context_window: 1048576
      max_output_tokens: 8192
      temperature: 0.2
      rate_limit:
        rpm: 5
        rpd: 20
        tpm: 250000
        tpd: 1000000

    gemini_3_flash:
      display_name: Gemini 3 Flash (preview)
      model: gemini/gemini-3-flash-preview
      context_window: 1048576
      max_output_tokens: 8192
      temperature: 0.2
      rate_limit:
        rpm: 5
        rpd: 20
        tpm: 250000
        tpd: 1000000

  nvidia:
    nvidia_llama:
      display_name: NVIDIA Llama 3.1 70B Instruct
      model: nvidia_nim/meta/llama-3.1-70b-instruct
      context_window: 131072
      max_output_tokens: 4096
      temperature: 0.2
      rate_limit:
        # NVIDIA's free build.nvidia.com/NIM tier only publishes a flat
        # 40 RPM cap per API key - no documented RPD/TPM/TPD, so those
        # are left high/unset rather than guessed.
        rpm: 40
